<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepToken | 统计分析中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-main: #f1f5f9;
            --bg-sidebar: #1e293b;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ===== Global Header ===== */
        .header {
            height: 64px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: var(--primary); cursor: pointer; }
        .scene-selector { background: #f1f5f9; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .scene-selector span { font-size: 12px; font-weight: 800; color: #1e293b; }
        .header-nav { display: flex; align-items: center; gap: 32px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-item { text-decoration: none; font-size: 14px; font-weight: 700; color: var(--text-muted); padding: 22px 0; position: relative; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px; border-radius: 12px; transition: all 0.2s; }
        .user-profile:hover { background: #f8fafc; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }

        /* ===== Main Layout ===== */
        .main-container { flex: 1; display: flex; overflow: hidden; }

        /* --- Left: Agent Sidebar --- */
        .agent-sidebar { width: 380px; background: var(--bg-sidebar); display: flex; flex-direction: column; flex-shrink: 0; }
        .agent-output { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .agent-bubble { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 16px; color: #f1f5f9; font-size: 14px; line-height: 1.6; border-bottom-left-radius: 4px; }
        
        .example-section { margin-top: 15px; }
        .example-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .example-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .example-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .example-card:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); transform: translateX(4px); }
        .example-card span { font-size: 13px; color: #cbd5e1; }

        .agent-input-box { padding: 20px; background: rgba(15, 23, 42, 0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        .input-wrapper { position: relative; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; }
        .agent-textarea { width: 100%; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 14px; height: 50px; }
        .send-btn { position: absolute; right: 12px; bottom: 12px; background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; }

        /* --- Middle: Analytics Workspace --- */
        .workspace-canvas { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #f8fafc; padding: 40px; }
        .section-header { margin-bottom: 30px; }
        .section-title { font-size: 24px; font-weight: 800; color: #1e293b; }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-mini { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); }
        .kpi-mini-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .kpi-mini-val { font-size: 22px; font-weight: 800; color: #1e293b; }

        .chart-card { background: white; border-radius: 24px; border: 1px solid var(--border-color); padding: 30px; margin-bottom: 30px; }
        .chart-title { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 20px; }
        .mock-line-chart { width: 100%; height: 200px; background: #f8fafc; border-radius: 16px; display: flex; align-items: flex-end; padding: 20px; gap: 15px; }
        .chart-bar { flex: 1; background: var(--primary); opacity: 0.1; border-radius: 4px; }

        .funnel-container { display: flex; flex-direction: column; gap: 12px; }
        .funnel-step { display: flex; align-items: center; gap: 20px; }
        .funnel-label { width: 100px; font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .funnel-bar-wrapper { flex: 1; background: #f1f5f9; height: 32px; border-radius: 6px; overflow: hidden; position: relative; }
        .funnel-bar-fill { height: 100%; background: var(--primary); border-radius: 6px; display: flex; align-items: center; padding-left: 15px; color: white; font-size: 11px; font-weight: 800; }

        .grid-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }

        /* ===== Scene Sub-Header (Compact) ===== */
        .sub-header {
            height: 52px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 999;
            flex-shrink: 0;
        }
        .sub-header-left { display: flex; align-items: center; gap: 12px; }
        .back-link { 
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            text-decoration: none; transition: all 0.2s; font-size: 12px;
        }
        .back-link:hover { background: #f1f5f9; color: var(--primary); border-color: var(--primary); }
        .current-scene-badge {
            background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; color: #1e293b;
            display: flex; align-items: center; gap: 6px;
        }
        .current-scene-badge i { color: var(--primary); font-size: 12px; }

        .sub-header-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .mode-tabs { display: flex; background: #f1f5f9; padding: 3px; border-radius: 10px; gap: 2px; }
        .tab-item { 
            text-decoration: none; font-size: 12px; font-weight: 700; color: var(--text-muted); 
            padding: 6px 16px; border-radius: 7px; transition: all 0.2s;
        }
        .tab-item:hover { color: var(--primary); }
        .tab-item.active { background: white; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

        .sub-header-right { display: flex; gap: 10px; }
        .btn-ghost-mini { 
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main); 
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-ghost-mini:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="location.href='Dashboard-AgentMode.html'"><i class="fas fa-brain"></i><span>DeepToken AI</span></div>
        </div>
        <nav class="header-nav">
            <a href="Dashboard-AgentMode.html" class="nav-item">工作台 (Workbench)</a>
            <a href="#" class="nav-item">资源中心</a>
            <a href="#" class="nav-item">系统设置</a>
        </nav>
        <div class="header-right">
            <div class="user-profile" onclick="location.href='Settings-AgentMode.html'">
                <div style="text-align: right;">
                    <div style="font-size: 12px; font-weight: 800;">Mike Admin</div>
                    <div style="font-size: 10px; color: var(--text-muted); font-weight: 600;">Pro Plan</div>
                </div>
                <div class="avatar">M</div>
            </div>
        </div>
    </header>

    <!-- 场景副导航 (Sub-header) -->
    <div class="sub-header">
        <div class="sub-header-left">
            <a href="Dashboard-AgentMode.html" class="back-link" title="返回工作台"><i class="fas fa-arrow-left"></i></a>
            <div class="current-scene-badge">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>场景：报销信息收集表</span>
            </div>
        </div>
        <div class="sub-header-center">
            <div class="mode-tabs">
                <a href="FormGenerator-AgentMode.html" class="tab-item">设计</a>
                <a href="SubmissionList-AgentMode.html" class="tab-item">数据</a>
                <a href="Analytics-AgentMode.html" class="tab-item active">分析</a>
                <a href="Integration-AgentMode.html" class="tab-item">发布</a>
            </div>
        </div>
        <div class="sub-header-right">
            <button class="btn-ghost-mini"><i class="fas fa-external-link-alt" style="margin-right:6px;"></i> 预览</button>
        </div>
    </div>

    <main class="main-container">
        <aside class="agent-sidebar">
            <div class="agent-output" id="agentOutput">
                <div class="agent-bubble">你好！我是你的 AI 数据分析专家。我可以帮你发现数据背后的增长机会与潜在问题。</div>
                <div class="example-section">
                    <span class="example-label">🧠 深度洞察指令</span>
                    <div class="example-grid">
                        <div class="example-card" onclick="triggerAgent('分析本周二转化率下降 15% 的原因')"><span>转化率异常分析</span></div>
                        <div class="example-card" onclick="triggerAgent('预测下个季度的提交量增长趋势')"><span>提交量趋势预测</span></div>
                        <div class="example-card" onclick="triggerAgent('对比市场部与技术部的报销金额占比')"><span>跨部门对比分析</span></div>
                    </div>
                </div>
            </div>
            <div class="agent-input-box">
                <div class="input-wrapper">
                    <textarea class="agent-textarea" id="agentInput" placeholder="输入分析需求..."></textarea>
                    <button class="send-btn" onclick="sendInput()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </aside>

        <section class="workspace-canvas">
            <div class="section-header"><h1 class="section-title">统计分析中心 / Analytics</h1></div>
            <!-- KPI & Charts content preserved -->
            <div class="kpi-row">
                <div class="kpi-mini"><div class="kpi-mini-label">总提交量</div><div class="kpi-mini-val">428</div></div>
                <div class="kpi-mini"><div class="kpi-mini-label">完成时长</div><div class="kpi-mini-val">1m 24s</div></div>
                <div class="kpi-mini"><div class="kpi-mini-label">转化率</div><div class="kpi-mini-val">84.2%</div></div>
                <div class="kpi-mini"><div class="kpi-mini-label">活跃度</div><div class="kpi-mini-val">高</div></div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">提交趋势分析 / Submission Trend</h3>
                <div class="mock-line-chart">
                    <div class="chart-bar" style="height: 40%;"></div>
                    <div class="chart-bar" style="height: 80%;"></div>
                    <div class="chart-bar" style="height: 60%;"></div>
                    <div class="chart-bar" style="height: 90%;"></div>
                </div>
            </div>
            <div class="grid-layout">
                <div class="chart-card">
                    <h3 class="chart-title">填写漏斗分析 / Conversion Funnel</h3>
                    <div class="funnel-container">
                        <div class="funnel-step"><div class="funnel-label">进入</div><div class="funnel-bar-wrapper"><div class="funnel-bar-fill" style="width: 100%;">1,204 次</div></div></div>
                        <div class="funnel-step"><div class="funnel-label">提交</div><div class="funnel-bar-wrapper"><div class="funnel-bar-fill" style="width: 60%; background:var(--success)">428 次</div></div></div>
                    </div>
                </div>
                <div class="chart-card"><h3 class="chart-title">部门分布</h3><div style="text-align:center; padding:20px;"><i class="fas fa-chart-pie" style="font-size:80px; color:var(--primary); opacity:0.1;"></i></div></div>
            </div>
        </section>
    </main>

    <script>
        function sendInput() {
            const input = document.getElementById('agentInput');
            if(!input.value.trim()) return;
            triggerAgent(input.value);
            input.value = '';
        }
        function triggerAgent(p) {
            const output = document.getElementById('agentOutput');
            const b = document.createElement('div');
            b.className = 'agent-bubble'; b.textContent = p;
            b.style.background = 'rgba(79, 70, 229, 0.2)'; b.style.alignSelf = 'flex-end';
            output.appendChild(b);
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
