<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepToken | AI Agent 表单工厂</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --bg-main: #f1f5f9;
            --bg-sidebar: #1e293b;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;

            /* Theme Defaults */
            --phone-bg: #ffffff;
            --phone-text: #0f172a;
            --phone-desc: #64748b;
            --phone-input-bg: #f8fafc;
            --phone-input-border: #e2e8f0;
        }

        /* Theme Variants */
        [data-theme="minimal"] {
            --phone-bg: #ffffff;
            --phone-text: #000000;
            --phone-desc: #94a3b8;
            --phone-input-bg: #ffffff;
            --phone-input-border: #f1f5f9;
        }
        [data-theme="dark"] {
            --phone-bg: #0f172a;
            --phone-text: #f8fafc;
            --phone-desc: #94a3b8;
            --phone-input-bg: #1e293b;
            --phone-input-border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ===== Global Header (Integrated) ===== */
        .header {
            height: 64px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: var(--primary); cursor: pointer; }
        .scene-selector {
            background: #f1f5f9; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 10px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .scene-selector span { font-size: 12px; font-weight: 800; color: #1e293b; }
        .header-nav { display: flex; align-items: center; gap: 32px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-item { 
            text-decoration: none; font-size: 14px; font-weight: 700; color: var(--text-muted); 
            padding: 22px 0; position: relative; transition: all 0.2s;
        }
        .nav-item:hover { color: var(--primary); }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after { 
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; 
            background: var(--primary); 
        }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px; border-radius: 12px; transition: all 0.2s; }
        .user-profile:hover { background: #f8fafc; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }

        /* ===== Main Layout ===== */
        .main-container { flex: 1; display: flex; overflow: hidden; }

        /* --- Left: Agent Sidebar (RESTORED) --- */
        .agent-sidebar {
            width: 400px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .agent-output { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .agent-bubble { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 16px; color: #f1f5f9; font-size: 14px; line-height: 1.6; border-bottom-left-radius: 4px; }
        
        .example-section { margin-top: 15px; }
        .example-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .example-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 15px; }
        .example-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            padding: 10px 14px; border-radius: 10px; cursor: pointer; transition: all 0.2s; 
            display: flex; align-items: center; gap: 10px; 
        }
        .example-card:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); transform: translateX(4px); }
        .example-card i { font-size: 13px; color: var(--primary); opacity: 0.8; }
        .example-card span { font-size: 13px; font-weight: 500; color: #cbd5e1; }

        .agent-input-box { padding: 20px; background: rgba(15, 23, 42, 0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        .input-wrapper { position: relative; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; }
        .agent-textarea { width: 100%; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 14px; height: 60px; }
        .send-btn { position: absolute; right: 12px; bottom: 12px; background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; }

        /* --- Middle: Canvas --- */
        .canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f1f5f9; }
        .canvas-header {
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 20px;
            min-width: 600px;
        }
        .canvas-header-left, .canvas-header-right { display: flex; align-items: center; gap: 12px; }
        
        .toggle-group { display: flex; background: #f1f5f9; padding: 3px; border-radius: 10px; }
        .toggle-btn { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; color: var(--text-muted); background: transparent; }
        .toggle-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .theme-select-box { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
        .theme-select { border: 1px solid var(--border-color); border-radius: 6px; padding: 4px 6px; font-size: 11px; outline: none; background: #f8fafc; cursor: pointer; }
        
        .btn-action { font-size: 11px; font-weight: 700; padding: 8px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; border: none; transition: all 0.2s; }
        .btn-preview { background: #f1f5f9; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-publish { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        .canvas-preview { flex: 1; padding: 20px; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }

        .phone-frame { 
            width: 360px; 
            height: 95%; 
            max-height: 820px;
            background: var(--phone-bg); 
            border-radius: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            border: 10px solid #0f172a; 
            position: relative; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 26px; background: #0f172a; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 20; }
        .phone-content { flex: 1; overflow-y: auto; scrollbar-width: none; padding-top: 30px; }
        .phone-content::-webkit-scrollbar { display: none; }
        
        /* --- Right: Fields & Editor --- */
        .fields-sidebar { width: 340px; background: white; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: 800; background: #f8fafc; }
        
        .fields-list-container { flex: 0.5; overflow-y: auto; padding: 15px; border-bottom: 4px solid #f1f5f9; }
        .field-card { 
            background: #f8fafc; border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 8px; 
            display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; 
        }
        .field-card:hover { border-color: var(--primary); }
        .field-card.active { border-color: var(--primary); background: #f5f3ff; }
        .field-info { display: flex; align-items: center; gap: 10px; }
        .field-title { font-size: 13px; font-weight: 700; }
        .field-meta { font-size: 10px; color: var(--text-muted); font-weight: 600; }
        
        .field-actions { display: flex; flex-direction: column; gap: 4px; opacity: 0.3; }
        .field-card:hover .field-actions { opacity: 1; }
        .action-btn { font-size: 10px; color: var(--text-muted); padding: 2px; cursor: pointer; }
        .action-btn:hover { color: var(--primary); }

        .field-editor-panel { flex: 0.5; overflow-y: auto; padding: 20px; background: white; }
        .editor-group { margin-bottom: 15px; }
        .editor-label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .editor-input, .editor-select { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; outline: none; background: #f8fafc; }
        .editor-switch { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* ===== Form Content ===== */
        .form-padding { padding: 30px; }
        .preview-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: var(--phone-text); }
        .preview-desc { font-size: 12px; color: var(--phone-desc); margin-bottom: 24px; line-height: 1.6; }
        .field-group { margin-bottom: 18px; }
        .field-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: var(--phone-text); }
        .field-label.required::after { content: ' *'; color: #ef4444; }
        .field-input-mock { width: 100%; padding: 10px 12px; border: 1px solid var(--phone-input-border); border-radius: 8px; font-size: 13px; background: var(--phone-input-bg); color: var(--phone-desc); }
        .field-help { font-size: 10px; color: var(--phone-desc); opacity: 0.7; margin-top: 4px; }
        
        .nav-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-mock { flex: 1; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; }

        .mode-single .field-group { display: none; }
        .mode-single .field-group.active { display: block; }

        /* ===== Scene Sub-Header (Compact) ===== */
        .sub-header {
            height: 52px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 999;
            flex-shrink: 0;
        }
        .sub-header-left { display: flex; align-items: center; gap: 12px; }
        .back-link { 
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            text-decoration: none; transition: all 0.2s; font-size: 12px;
        }
        .back-link:hover { background: #f1f5f9; color: var(--primary); border-color: var(--primary); }
        .current-scene-badge {
            background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; color: #1e293b;
            display: flex; align-items: center; gap: 6px;
        }
        .current-scene-badge i { color: var(--primary); font-size: 12px; }

        .sub-header-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .mode-tabs { display: flex; background: #f1f5f9; padding: 3px; border-radius: 10px; gap: 2px; }
        .tab-item { 
            text-decoration: none; font-size: 12px; font-weight: 700; color: var(--text-muted); 
            padding: 6px 16px; border-radius: 7px; transition: all 0.2s;
        }
        .tab-item:hover { color: var(--primary); }
        .tab-item.active { background: white; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

        .sub-header-right { display: flex; gap: 10px; }
        .btn-preview-mini { 
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main); 
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-preview-mini:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="location.href='Dashboard-AgentMode.html'"><i class="fas fa-brain"></i><span>DeepToken AI</span></div>
        </div>
        <nav class="header-nav">
            <a href="Dashboard-AgentMode.html" class="nav-item">工作台 (Workbench)</a>
            <a href="#" class="nav-item">资源中心</a>
            <a href="#" class="nav-item">系统设置</a>
        </nav>
        <div class="header-right">
            <div class="user-profile" onclick="location.href='Settings-AgentMode.html'">
                <div style="text-align: right;">
                    <div style="font-size: 12px; font-weight: 800;">Mike Admin</div>
                    <div style="font-size: 10px; color: var(--text-muted); font-weight: 600;">Pro Plan</div>
                </div>
                <div class="avatar">M</div>
            </div>
        </div>
    </header>

    <!-- 场景副导航 (Sub-header) -->
    <div class="sub-header">
        <div class="sub-header-left">
            <a href="Dashboard-AgentMode.html" class="back-link" title="返回工作台"><i class="fas fa-arrow-left"></i></a>
            <div class="current-scene-badge">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>场景：报销信息收集表</span>
            </div>
        </div>
        <div class="sub-header-center">
            <div class="mode-tabs">
                <a href="FormGenerator-AgentMode.html" class="tab-item active">设计</a>
                <a href="SubmissionList-AgentMode.html" class="tab-item">数据</a>
                <a href="Analytics-AgentMode.html" class="tab-item">分析</a>
                <a href="Integration-AgentMode.html" class="tab-item">发布</a>
            </div>
        </div>
        <div class="sub-header-right">
            <button class="btn-preview-mini"><i class="fas fa-play" style="margin-right:6px;"></i> 运行</button>
        </div>
    </div>

    <main class="main-container">
        <!-- 左侧 Agent 空间 (FULLY RESTORED FROM GOLD VERSION) -->
        <aside class="agent-sidebar">
            <div class="agent-output" id="agentOutput">
                <div class="agent-bubble">
                    你好！我是你的 AI 助手。你可以直接向我下达指令来管理表单场景。
                    
                    <div class="example-section">
                        <span class="example-label">✨ 场景创建</span>
                        <div class="example-grid">
                            <div class="example-card" onclick="triggerAgent('帮我创建一个“会议签到表”，需要包含姓名、单位、手机和午餐偏好')">
                                <i class="fas fa-plus-circle"></i>
                                <span>创建会议签到表</span>
                            </div>
                            <div class="example-card" onclick="triggerAgent('生成一个“IT 设备报修单”，包含设备编号、故障描述和紧急程度')">
                                <i class="fas fa-tools"></i>
                                <span>生成 IT 报修单</span>
                            </div>
                        </div>
                    </div>

                    <div class="example-section">
                        <span class="example-label">🛠️ 快速修改</span>
                        <div class="example-grid">
                            <div class="example-card" onclick="triggerAgent('在表单末尾增加一个“反馈建议”的多行文本框')">
                                <i class="fas fa-edit"></i>
                                <span>增加反馈字段</span>
                            </div>
                            <div class="example-card" onclick="triggerAgent('把表单的主题风格切换为暗黑模式')">
                                <i class="fas fa-moon"></i>
                                <span>切换暗黑模式</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="agent-input-box">
                <div class="input-wrapper">
                    <textarea class="agent-textarea" id="agentInput" placeholder="描述你的需求..."></textarea>
                    <button class="send-btn" onclick="sendInput()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </aside>

        <!-- 中间 画布区 (RESTORED FROM GOLD VERSION) -->
        <section class="canvas-area">
            <div class="canvas-header">
                <div class="canvas-header-left">
                    <div class="toggle-group">
                        <button class="toggle-btn active">📱 手机</button>
                        <button class="toggle-btn">💻 电脑</button>
                    </div>
                    <div class="toggle-group" id="modeToggle">
                        <button class="toggle-btn" data-val="all">全部展示</button>
                        <button class="toggle-btn active" data-val="single">单题流</button>
                    </div>
                </div>
                <div class="canvas-header-right">
                    <div class="theme-select-box">
                        <span>风格</span>
                        <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
                            <option value="business">商务专业</option>
                            <option value="minimal">极简纯白</option>
                            <option value="dark">黑客暗黑</option>
                        </select>
                    </div>
                    <button class="btn-action btn-preview" id="btnFullPreview">
                        <i class="fas fa-expand"></i> 演示模式
                    </button>
                    <button class="btn-action btn-publish" onclick="location.href='Integration-AgentMode.html'">
                        <i class="fas fa-rocket"></i> 发布表单
                    </button>
                </div>
            </div>
            <div class="canvas-preview">
                <div class="phone-frame mode-single" id="mainPreview">
                    <div class="phone-notch"></div>
                    <div class="phone-content">
                        <div class="form-padding">
                            <h2 class="preview-title" id="formTitle">报销信息收集表</h2>
                            <p class="preview-desc" id="formDesc">请准确填写相关报销内容。</p>
                            <div id="fieldsContainer"></div>
                            <div class="nav-footer">
                                <div class="btn-mock" id="btnPrev" style="background: #f1f5f9;">上一题</div>
                                <div class="btn-mock" id="btnNext" style="background: var(--primary); color: white;">下一题</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右侧 字段与编辑器 (RESTORED FROM GOLD VERSION) -->
        <aside class="fields-sidebar">
            <div class="panel-header">字段结构 (FIELDS)</div>
            <div class="fields-list-container" id="fieldList"></div>
            
            <div class="field-editor-panel">
                <div class="panel-header" style="padding:0 0 10px 0; border:none; background:none;">内容编辑 (EDITOR)</div>
                <div id="editorEmpty" style="color:#94a3b8; font-size:12px; text-align:center; padding-top:20px;">点击字段进行配置</div>
                <div id="editorContent" style="display:none;">
                    <div class="editor-group">
                        <label class="editor-label">字段标题 (Title)</label>
                        <input type="text" class="editor-input" id="editTitle">
                    </div>
                    <div class="editor-group">
                        <label class="editor-label">字段类型 (Type)</label>
                        <select class="editor-select" id="editType">
                            <option value="text">文本输入</option>
                            <option value="number">数字金额</option>
                            <option value="select">下拉选择</option>
                            <option value="date">日期选择</option>
                        </select>
                    </div>
                    <div class="editor-group">
                        <label class="editor-label">占位提示 (Placeholder)</label>
                        <input type="text" class="editor-input" id="editPlaceholder">
                    </div>
                    <div class="editor-group">
                        <label class="editor-label">帮助文本 (Help Text)</label>
                        <input type="text" class="editor-input" id="editHelp">
                    </div>
                    <div class="editor-group">
                        <label class="editor-switch">
                            <input type="checkbox" id="editRequired"> 设为必填项 (Required)
                        </label>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let fields = [
            { id: 1, title: '报销人姓名', type: 'text', placeholder: '请输入姓名', required: true, help: '请填写实名' },
            { id: 2, title: '所属部门', type: 'select', placeholder: '请选择部门', required: true },
            { id: 3, title: '费用金额', type: 'number', placeholder: '0.00', required: true }
        ];

        let currentIndex = 0, selectedFieldId = null, currentMode = 'single';

        function render() {
            const container = document.getElementById('fieldsContainer');
            const list = document.getElementById('fieldList');
            container.innerHTML = ''; list.innerHTML = '';
            
            fields.forEach((f, idx) => {
                const fDiv = document.createElement('div');
                fDiv.className = 'field-group' + (currentIndex === idx ? ' active' : '');
                fDiv.innerHTML = `
                    <label class="field-label ${f.required ? 'required' : ''}">${f.title}</label>
                    <div class="field-input-mock">${f.placeholder || '请输入'}</div>
                    ${f.help ? `<div class="field-help">${f.help}</div>` : ''}
                `;
                container.appendChild(fDiv);

                const card = document.createElement('div');
                card.className = 'field-card' + (selectedFieldId === f.id ? ' active' : '');
                card.onclick = () => selectField(f.id, idx);
                card.innerHTML = `
                    <div class="field-info">
                        <div style="font-size:14px; color:var(--primary);"><i class="fas fa-grip-vertical"></i></div>
                        <div>
                            <div class="field-title">${f.title}</div>
                            <div class="field-meta">${f.type.toUpperCase()} ${f.required ? '· 必填' : ''}</div>
                        </div>
                    </div>
                    <div class="field-actions">
                        <i class="fas fa-chevron-up action-btn" onclick="moveField(${idx}, -1, event)"></i>
                        <i class="fas fa-chevron-down action-btn" onclick="moveField(${idx}, 1, event)"></i>
                    </div>
                `;
                list.appendChild(card);
            });
            
            document.getElementById('mainPreview').className = 'phone-frame mode-' + currentMode;
            document.querySelector('.nav-footer').style.display = currentMode === 'single' ? 'flex' : 'none';
        }

        function selectField(id, idx) {
            selectedFieldId = id; currentIndex = idx;
            const f = fields.find(field => field.id === id);
            document.getElementById('editorEmpty').style.display = 'none';
            document.getElementById('editorContent').style.display = 'block';
            document.getElementById('editTitle').value = f.title;
            document.getElementById('editType').value = f.type;
            document.getElementById('editPlaceholder').value = f.placeholder || '';
            document.getElementById('editHelp').value = f.help || '';
            document.getElementById('editRequired').checked = !!f.required;
            render();
        }

        function moveField(idx, dir, e) {
            e.stopPropagation();
            const newIdx = idx + dir;
            if(newIdx < 0 || newIdx >= fields.length) return;
            const item = fields.splice(idx, 1)[0];
            fields.splice(newIdx, 0, item);
            currentIndex = newIdx;
            render();
        }

        ['editTitle', 'editPlaceholder', 'editHelp', 'editType', 'editRequired'].forEach(id => {
            const el = document.getElementById(id);
            const eventName = el.type === 'checkbox' ? 'change' : (el.tagName === 'SELECT' ? 'change' : 'input');
            el[eventName === 'input' ? 'oninput' : 'onchange'] = (e) => {
                const f = fields.find(field => field.id === selectedFieldId);
                if(!f) return;
                if(id === 'editTitle') f.title = e.target.value;
                if(id === 'editPlaceholder') f.placeholder = e.target.value;
                if(id === 'editHelp') f.help = e.target.value;
                if(id === 'editType') f.type = e.target.value;
                if(id === 'editRequired') f.required = e.target.checked;
                render();
            };
        });

        document.getElementById('modeToggle').onclick = (e) => {
            if(e.target.dataset.val) {
                currentMode = e.target.dataset.val;
                document.querySelectorAll('#modeToggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.val === currentMode));
                render();
            }
        };

        function changeTheme(val) { document.body.setAttribute('data-theme', val); }
        function sendInput() {
            const input = document.getElementById('agentInput');
            if(!input.value.trim()) return;
            triggerAgent(input.value);
            input.value = '';
        }

        function triggerAgent(p) {
            const output = document.getElementById('agentOutput');
            const b = document.createElement('div');
            b.className = 'agent-bubble'; b.textContent = p;
            b.style.background = 'rgba(79, 70, 229, 0.2)'; b.style.alignSelf = 'flex-end';
            output.appendChild(b);
            output.scrollTop = output.scrollHeight;
        }

        document.getElementById('btnNext').onclick = () => { if(currentIndex < fields.length - 1) { currentIndex++; render(); } };
        document.getElementById('btnPrev').onclick = () => { if(currentIndex > 0) { currentIndex--; render(); } };

        // INITIALIZE
        render();
        selectField(fields[0].id, 0); 
    </script>
</body>
</html>
